<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="assets/styles/css/styles.css" />
    <script src="assets/scripts/js/credentials-input-module-controller.js"></script>
    <script src="assets/scripts/js/battle-control-module.js"></script>
    <script src="assets/scripts/js/math-task-module.js"></script>
    <script src="assets/scripts/js/translation-task-module.js"></script>
    <script src="assets/scripts/js/listening-task-module.js"></script>
    <script src="assets/scripts/js/drag-n-drop-task-module.js"></script>
    <script src="assets/scripts/js/task-module-controller.js"></script>
    <script src="assets/scripts/js/spell-module-controller.js"></script>
    <script src="assets/scripts/js/battle-control-module.js"></script>
    <script src="assets/scripts/js/name-generator-module.js"></script>
    <script src="assets/scripts/js/monster-generator-module.js"></script>
    <script src="assets/scripts/js/characters-info-module.js"></script>
    <script src="assets/scripts/js/score-module-controller.js"></script>

    <script src="assets/scripts/js/game-module.js"></script>
</head>

<body>

    <header>

    </header>

    <main>
        <section class="game-module">
            <section class="landing-section">
                <form class="credentials-input-form">
                    <span class="name-input-label">Enter your name: </span>
                    <input class="name-input" type="text" />
                    <input class="name-input-submit" type="submit" value="Done" />
                </form>
            </section>
            <section class="battle-view">
                <section class="characters-info">
                    <div class="allies"></div>
                    <div class="enemies"></div>
                    <canvas class="battle-view-renderer">

                    </canvas>
                </section>
                <form class="battle-control-form invisible">
                    <section class="spell-panel-window invisible">
                        <section class="spell-panel">
                            <section class="spell-panel-content">

                            </section>
                            <input class="select-spell-input" type="submit" value="Done" />
                        </section>

                    </section>

                    <section class="task-module invisible">
                        <section class="math-task-section invisible">
                            <p>MATH</p>
                            <span class="math-expression-holder"></span>
                            <input class="math-answer-input" type="text" />
                        </section>
                        <section class="translation-task-section invisible">
                            <p>TRANSLATION</p>
                            <span class="translation-word-holder"></span>
                            <input class="translation-answer-input" type="text" />
                        </section>
                        <section class="drag-n-drop-task-section invisible">
                            <p>DRAG'N'DROP</p>
                            <div class="drag-n-drop-shuffled-word-holder" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                            <div class="drag-n-drop-answer-input" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
                        </section>
                        <section class="listening-task-section invisible">
                            <p>LISTENING</p>
                            <input class="listeting-playback" type="submit" value="Play" />
                            <input class="listening-answer-input" type="text" />
                        </section>
                        <input class="answer-submit-input" type="submit" value="Done" />
                    </section>
                    <input class="launch-battle-input" type="submit" value="Launch" />
                </form>
            </section>
            <section class="score-module-section invisible">
                <table class="score-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>kills</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </section>
        </section>
    </main>

    <footer>

    </footer>

</body>

</html>
